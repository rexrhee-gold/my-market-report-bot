name: Daily Market Report

on:
  schedule:
    - cron: "0 22 * * 0-4"
  workflow_dispatch:

jobs:
  run-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Show files
        run: |
          echo "현재 파일 구조 확인"
          ls -R

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check required secrets
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: |
          test -n "$OPENAI_API_KEY" || (echo "OPENAI_API_KEY 없음" && exit 1)
          test -n "$NEWSAPI_KEY" || (echo "NEWSAPI_KEY 없음" && exit 1)
          test -n "$EMAIL_TO" || (echo "EMAIL_TO 없음" && exit 1)
          test -n "$SMTP_HOST" || (echo "SMTP_HOST 없음" && exit 1)
          test -n "$SMTP_PORT" || (echo "SMTP_PORT 없음" && exit 1)
          test -n "$SMTP_USER" || (echo "SMTP_USER 없음" && exit 1)
          test -n "$SMTP_PASSWORD" || (echo "SMTP_PASSWORD 없음" && exit 1)
          echo "필수 Secrets 확인 완료"

      - name: Run daily report
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: python -u main.py
