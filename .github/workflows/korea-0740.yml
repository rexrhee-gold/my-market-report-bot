name: Korea Market 0740 Report

on:
  schedule:
    # 한국시간 기준 실행
    - cron: "40 7 * * 1-5"
      timezone: "Asia/Seoul"

  workflow_dispatch:

jobs:
  korea-0740-report:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Print runner time
        run: |
          echo "UTC time:"
          date -u
          echo "KST time:"
          TZ=Asia/Seoul date
          echo "GitHub event: ${{ github.event_name }}"
          echo "GitHub schedule: ${{ github.event.schedule }}"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Korea 0740 premarket report
        env:
          REPORT_MODE: "0740"
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          ALPHAVANTAGE_KEY: ${{ secrets.ALPHAVANTAGE_KEY }}
          OPENDART_API_KEY: ${{ secrets.OPENDART_API_KEY }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_PARENT_PAGE_ID: ${{ secrets.NOTION_PARENT_PAGE_ID }}
          OPENDART_TIMEOUT: "8"
          OPENDART_MAX_COMPANIES: "25"
        run: python korea_market.py
