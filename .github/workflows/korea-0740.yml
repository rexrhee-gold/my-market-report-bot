name: Korea Market 0740 Report

on:
  schedule:
    # 한국시간 월~금 07:40 = UTC 일~목 22:40
    # GitHub Actions schedule cron is UTC.
    - cron: "40 22 * * 0-4"

  workflow_dispatch:

jobs:
  korea-0740-report:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Print runner time
        run: |
          echo "UTC time:"
          date -u
          echo "KST time:"
          TZ=Asia/Seoul date
          echo "GitHub event: ${{ github.event_name }}"
          echo "GitHub schedule: ${{ github.event.schedule }}"

      - name: Check KST execution window
        id: kst_guard
        run: |
          echo "Workflow: Korea Market 0740 Report"
          echo "Allowed KST window: 07:30~08:10 KST"

          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "Manual run detected. Bypassing KST guard."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          HOUR=$(TZ=Asia/Seoul date +%H)
          MIN=$(TZ=Asia/Seoul date +%M)
          MIN_NUM=$((10#$MIN))

          echo "Current KST time: $HOUR:$MIN"
          SHOULD_RUN=false

          if [ "$HOUR" = "07" ] && [ "$MIN_NUM" -ge 30 ]; then
            SHOULD_RUN=true
          fi

          if [ "$HOUR" = "08" ] && [ "$MIN_NUM" -le 10 ]; then
            SHOULD_RUN=true
          fi

          if [ "$SHOULD_RUN" = "true" ]; then
            echo "Inside allowed KST window. Continue."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "Outside allowed KST window. Skip report sending."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: steps.kst_guard.outputs.should_run == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Korea 0740 premarket report
        if: steps.kst_guard.outputs.should_run == 'true'
        env:
          REPORT_MODE: "0740"
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          ALPHAVANTAGE_KEY: ${{ secrets.ALPHAVANTAGE_KEY }}
          OPENDART_API_KEY: ${{ secrets.OPENDART_API_KEY }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_PARENT_PAGE_ID: ${{ secrets.NOTION_PARENT_PAGE_ID }}
          OPENDART_TIMEOUT: "8"
          OPENDART_MAX_COMPANIES: "25"
        run: python -u korea_market.py
