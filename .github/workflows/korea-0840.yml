name: Korea Market 0840 Check

on:
  schedule:
    # Multiple attempts are used because GitHub scheduled jobs can be delayed or dropped.
    - cron: "30,45 23 * * 0-4"
    - cron: "0,10 0 * * 1-5"

  workflow_dispatch:

jobs:
  korea-0840-check:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Print runner time
        run: |
          echo "UTC time:"
          date -u
          echo "KST time:"
          TZ=Asia/Seoul date
          echo "GitHub event: ${{ github.event_name }}"
          echo "GitHub schedule: ${{ github.event.schedule }}"

      - name: Check KST execution window
        id: kst_guard
        run: |
          echo "Workflow: Korea Market 0840 Check"
          echo "Allowed KST window: 08:30~09:10 KST, weekdays only"

          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "Manual run detected. Bypassing KST guard."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "report_key=korea-0840-manual-${{ github.run_id }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          KST_DATE=$(TZ=Asia/Seoul date +%Y%m%d)
          KST_DAY=$(TZ=Asia/Seoul date +%u)
          HOUR=$(TZ=Asia/Seoul date +%H)
          MIN=$(TZ=Asia/Seoul date +%M)
          MIN_NUM=$((10#$MIN))

          echo "Current KST date: $KST_DATE"
          echo "Current KST day: $KST_DAY"
          echo "Current KST time: $HOUR:$MIN"

          SHOULD_RUN=false
          REPORT_SLOT="korea-0840"

          if [ "$KST_DAY" -ge 1 ] && [ "$KST_DAY" -le 5 ]; then
            if [ "$HOUR" = "08" ] && [ "$MIN_NUM" -ge 30 ]; then SHOULD_RUN=true; REPORT_SLOT="korea-0840"; fi
            if [ "$HOUR" = "09" ] && [ "$MIN_NUM" -le 10 ]; then SHOULD_RUN=true; REPORT_SLOT="korea-0840"; fi
          fi

          if [ "$SHOULD_RUN" = "true" ]; then
            REPORT_KEY="$REPORT_SLOT-$KST_DATE"
            echo "Inside allowed KST window. Continue."
            echo "Report key: $REPORT_KEY"
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "report_key=$REPORT_KEY" >> "$GITHUB_OUTPUT"
          else
            echo "Outside allowed KST window. Skip report sending."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "report_key=korea-0840-skip-$KST_DATE-$HOUR$MIN" >> "$GITHUB_OUTPUT"
          fi

      - name: Restore sent marker
        id: sent_cache
        if: steps.kst_guard.outputs.should_run == 'true' && github.event_name == 'schedule'
        uses: actions/cache@v4
        with:
          path: .workflow-sent/${{ steps.kst_guard.outputs.report_key }}.txt
          key: ${{ steps.kst_guard.outputs.report_key }}

      - name: Prepare sent marker
        if: steps.kst_guard.outputs.should_run == 'true' && (github.event_name != 'schedule' || steps.sent_cache.outputs.cache-hit != 'true')
        run: |
          mkdir -p .workflow-sent
          echo "sent marker for ${{ steps.kst_guard.outputs.report_key }}" > ".workflow-sent/${{ steps.kst_guard.outputs.report_key }}.txt"

      - name: Install dependencies
        if: steps.kst_guard.outputs.should_run == 'true' && (github.event_name != 'schedule' || steps.sent_cache.outputs.cache-hit != 'true')
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Korea 0840 pre-open check
        if: steps.kst_guard.outputs.should_run == 'true' && (github.event_name != 'schedule' || steps.sent_cache.outputs.cache-hit != 'true')
        env:
          REPORT_MODE: "0840"
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          ALPHAVANTAGE_KEY: ${{ secrets.ALPHAVANTAGE_KEY }}
          OPENDART_API_KEY: ${{ secrets.OPENDART_API_KEY }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_PARENT_PAGE_ID: ${{ secrets.NOTION_PARENT_PAGE_ID }}
          OPENDART_TIMEOUT: "8"
          OPENDART_MAX_COMPANIES: "25"
        run: python -u korea_market.py

      - name: Already sent for this slot
        if: steps.kst_guard.outputs.should_run == 'true' && github.event_name == 'schedule' && steps.sent_cache.outputs.cache-hit == 'true'
        run: |
          echo "Report already sent for ${{ steps.kst_guard.outputs.report_key }}. Skip duplicate sending."
