name: US Market Daily Report

on:
  schedule:
    # 한국시간 화~토 06:50 = UTC 월~금 21:50
    # GitHub Actions schedule cron is UTC.
    - cron: "50 21 * * 1-5"

  workflow_dispatch:

jobs:
  us-market-daily-report:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Print runner time
        run: |
          echo "UTC time:"
          date -u
          echo "KST time:"
          TZ=Asia/Seoul date
          echo "GitHub event: ${{ github.event_name }}"
          echo "GitHub schedule: ${{ github.event.schedule }}"

      - name: Check KST execution window
        id: kst_guard
        run: |
          echo "Workflow: US Market Daily Report"
          echo "Allowed KST window: 06:30~07:30 KST"

          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "Manual run detected. Bypassing KST guard."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          HOUR=$(TZ=Asia/Seoul date +%H)
          MIN=$(TZ=Asia/Seoul date +%M)
          MIN_NUM=$((10#$MIN))

          echo "Current KST time: $HOUR:$MIN"
          SHOULD_RUN=false

          if [ "$HOUR" = "06" ] && [ "$MIN_NUM" -ge 30 ]; then
            SHOULD_RUN=true
          fi

          if [ "$HOUR" = "07" ] && [ "$MIN_NUM" -le 30 ]; then
            SHOULD_RUN=true
          fi

          if [ "$SHOULD_RUN" = "true" ]; then
            echo "Inside allowed KST window. Continue."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "Outside allowed KST window. Skip report sending."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: steps.kst_guard.outputs.should_run == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run US market daily report
        if: steps.kst_guard.outputs.should_run == 'true'
        env:
          US_PROMPT_PATH: "prompts/us_market_v4.md"
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          ALPHAVANTAGE_KEY: ${{ secrets.ALPHAVANTAGE_KEY }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_PARENT_PAGE_ID: ${{ secrets.NOTION_PARENT_PAGE_ID }}
        run: python -u us_market.py
