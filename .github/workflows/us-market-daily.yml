name: US Market Daily Report

on:
  schedule:
    # 한국시간 화~토 06:50 = UTC 월~금 21:50
    # GitHub Actions schedule cron is UTC.
    - cron: "50 21 * * 1-5"

  workflow_dispatch:

jobs:
  us-market-daily-report:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Print runner time
        run: |
          echo "UTC time:"
          date -u
          echo "KST time:"
          TZ=Asia/Seoul date
          echo "GitHub event: ${{ github.event_name }}"
          echo "GitHub schedule: ${{ github.event.schedule }}"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run US market daily report
        env:
          US_PROMPT_PATH: "prompts/us_market_v4.md"
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          ALPHAVANTAGE_KEY: ${{ secrets.ALPHAVANTAGE_KEY }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_PARENT_PAGE_ID: ${{ secrets.NOTION_PARENT_PAGE_ID }}
        run: python us_market.py
